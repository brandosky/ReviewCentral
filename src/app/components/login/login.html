<div class="form-container">
    <h2>Iniciar Sesión</h2>
    <p>Ingresa tu correo y contraseña para acceder a tu cuenta.</p>
    
    <form [formGroup]="formularioLogin" (ngSubmit)="iniciarSesion()">
        
        <div class="form-group">
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" formControlName="email">
            <small class="text-danger error-message" *ngIf="formularioLogin.get('email')?.invalid && formularioLogin.get('email')?.touched">
                Ingresa un correo válido.
            </small>
        </div>
        
        <div class="form-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" formControlName="password">
            <small class="text-danger error-message" *ngIf="formularioLogin.get('password')?.invalid && formularioLogin.get('password')?.touched">
                La contraseña es obligatoria.
            </small>
        </div>
        
        <button type="submit" class="btn-primario" [disabled]="formularioLogin.invalid">Iniciar Sesión</button>
    </form>
    
    <div class="form-links">
        <p>¿No tienes una cuenta? <a routerLink="/registro">Crear Cuenta</a></p>
        <a routerLink="/">Volver al inicio</a>
    </div>
</div>
